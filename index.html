<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bundle Tiers — Admin Prototype v7</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f1f1f1;
  padding: 32px 24px;
  color: #303030;
  font-size: 13px;
  line-height: 20px;
}

/* ── Layout ───────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 434px minmax(0, 1fr);
  gap: 16px;
  align-items: start;
  max-width: 980px;
}

/* ── Polaris card ─────────────────────────────────── */
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow:
    inset 1px 0 0 0 rgba(0,0,0,0.13),
    inset -1px 0 0 0 rgba(0,0,0,0.13),
    inset 0 -1px 0 0 rgba(0,0,0,0.17),
    inset 0 1px 0 0 rgba(204,204,204,0.5),
    0 1px 0 0 rgba(26,26,26,0.07);
}

.card-section {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card-header { display: flex; flex-direction: column; gap: 2px; }
.card-title { font-size: 13px; font-weight: 650; color: #303030; line-height: 20px; }
.card-subtitle { font-size: 13px; font-weight: 450; color: #616161; line-height: 20px; }

/* ── Form elements ────────────────────────────────── */
input[type=text],
input[type=number],
select {
  font-family: inherit;
  font-size: 13px;
  font-weight: 450;
  line-height: 20px;
  height: 32px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 0.66px solid #8a8a8a;
  background: #fdfdfd;
  color: #303030;
  width: 100%;
  outline: none;
}

input[type=text]:focus,
input[type=number]:focus,
select:focus {
  border-color: #005bd3;
  box-shadow: 0 0 0 3px rgba(0,91,211,0.15);
}

input:disabled {
  background: #f7f7f7;
  color: #8a8a8a;
  cursor: not-allowed;
  border-color: #c9cccf;
}

select { cursor: pointer; }

/* ── Tier boxes ───────────────────────────────────── */
.tier-boxes { display: flex; flex-direction: column; gap: 16px; }

.tier-box {
  border: 1px solid #e3e3e3;
  border-radius: 8px;
}

.tier-box-header {
  background: #f7f7f7;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tier-box-label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 550;
  color: #303030;
}

.tier-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #616161;
}

.tier-btn-group { display: flex; gap: 4px; align-items: center; }

.tier-icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #616161;
  transition: background 0.12s;
  line-height: 1;
}

.tier-icon-btn:hover { background: #ebebeb; }
.tier-icon-btn.remove:hover { color: #d72c0d; background: #fff4f4; }

.tier-box-content {
  background: #fff;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.tier-row { display: flex; gap: 12px; align-items: flex-start; }

.field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.field-qty { flex: 0 0 80px; }

.field-label {
  font-size: 13px;
  font-weight: 450;
  color: #303030;
  line-height: 20px;
}

/* Price value input with affix */
.price-value-wrap { position: relative; }
.price-value-wrap.has-prefix input { padding-left: 22px; }
.price-value-wrap.has-suffix input { padding-right: 26px; }
.price-affix {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: #616161;
  pointer-events: none;
}
.price-affix.prefix { left: 10px; }
.price-affix.suffix { right: 10px; }

/* ── Add tier button ──────────────────────────────── */
.add-tier-box {
  border: 1px solid #e3e3e3;
  border-radius: 8px;
  overflow: hidden;
}

.add-tier-btn {
  background: #fff;
  border: none;
  cursor: pointer;
  padding: 12px;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 550;
  color: #303030;
  transition: background 0.12s;
  border-radius: 0;
}

.add-tier-btn:hover { background: #f7f7f7; }

.add-tier-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #303030;
}

/* ── Checkbox ─────────────────────────────────────── */
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}

.checkbox-row input[type=checkbox] {
  width: 16px;
  height: 16px;
  accent-color: #303030;
  cursor: pointer;
  flex-shrink: 0;
  margin: 0;
  border-radius: 4px;
  border: 0.66px solid #8a8a8a;
}

.checkbox-label { font-size: 13px; font-weight: 450; color: #303030; line-height: 20px; }

.checkbox-child { display: none; padding-left: 24px; margin-top: 8px; }
.checkbox-child.visible { display: flex; flex-direction: column; gap: 8px; }

/* Unit size — no indent, matches Figma */
.unit-size-section { display: flex; flex-direction: column; }
.unit-size-child { display: none; flex-direction: column; gap: 12px; margin-top: 8px; }
.unit-size-child.visible { display: flex; }
.unit-size-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Display settings ─────────────────────────────── */
.display-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.display-field { display: flex; flex-direction: column; gap: 4px; position: relative; }

.display-field-label-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.display-field-label-row span {
  font-size: 13px;
  font-weight: 450;
  color: #303030;
  line-height: 20px;
}

.var-icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
  flex-shrink: 0;
}

.var-icon-btn:hover { background: rgba(0,0,0,0.05); }

/* ── Action list popover ──────────────────────────── */
.action-list {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: #fff;
  border-radius: 12px;
  box-shadow:
    0 4px 6px -2px rgba(26,26,26,0.2),
    inset 1px 0 0 0 rgba(0,0,0,0.13),
    inset -1px 0 0 0 rgba(0,0,0,0.13),
    inset 0 -1px 0 0 rgba(0,0,0,0.17),
    inset 0 1px 0 0 rgba(204,204,204,0.5);
  z-index: 200;
  min-width: 120px;
  padding: 6px;
  display: none;
}

.action-list.open { display: block; }

.action-list-item {
  padding: 6px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 450;
  color: #303030;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s;
}

.action-list-item:hover { background: #f7f7f7; }

/* Tier btn group wrapper needs relative for popover */
.tier-btn-group {
  position: relative;
}

/* ── Tooltip ──────────────────────────────────────── */
.tooltip-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.tooltip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border-radius: 8px;
  padding: 4px 8px;
  font-size: 13px;
  font-weight: 450;
  color: #303030;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  box-shadow:
    0 4px 6px -2px rgba(26,26,26,0.2),
    inset 1px 0 0 0 rgba(0,0,0,0.13),
    inset -1px 0 0 0 rgba(0,0,0,0.13),
    inset 0 -1px 0 0 rgba(0,0,0,0.17),
    inset 0 1px 0 0 rgba(204,204,204,0.5);
  z-index: 300;
}

.tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #fff;
}

.tooltip-wrap:hover .tooltip { opacity: 1; }

/* Var dropdown */
.var-dropdown {
  position: fixed;
  background: #fff;
  border: 1px solid #e3e3e3;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 9999;
  min-width: 200px;
  padding: 4px 0;
  display: none;
}

.var-dropdown.open { display: block; }

.var-group-label {
  font-size: 11px;
  font-weight: 600;
  color: #8a8a8a;
  padding: 8px 12px 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.var-group + .var-group { border-top: 1px solid #f1f1f1; }

.var-item {
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 450;
  color: #303030;
  cursor: pointer;
  transition: background 0.1s;
}

.var-item:hover { background: #f7f7f7; }

/* Unit size child */
.unit-size-row { display: grid; grid-template-columns: 100px 1fr; gap: 8px; }
.col-label { font-size: 11px; color: #8a8a8a; margin-bottom: 3px; font-weight: 500; }
.sub-hint { font-size: 12px; color: #8a8a8a; line-height: 1.5; margin-top: 2px; }

/* ── Preview card ─────────────────────────────────── */
.preview-card { position: sticky; top: 32px; }
.preview-label { font-size: 13px; font-weight: 650; color: #303030; margin-bottom: 16px; }
.bundle-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

.b-card {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid #e6e6e6;
  background: #fff;
  cursor: pointer;
  position: relative;
  transition: border-color 0.15s;
  min-height: 48px;
}

.b-card:hover { border-color: #c9cccf; }

.b-card.active {
  border: 2px solid #303030;
  background: #fff;
}

.b-radio {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid #8a8a8a;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
}

.b-card.active .b-radio { border-color: #303030; }

.b-radio-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: transparent;
  transition: background 0.15s;
}

.b-card.active .b-radio-dot { background: #303030; }

.b-info { margin-left: 10px; flex: 1; min-width: 0; }
.b-name-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.b-name { font-size: 13px; font-weight: 550; color: #303030; }

.b-tag {
  font-size: 11px;
  color: #616161;
  background: #f1f1f1;
  padding: 1px 6px;
  border-radius: 4px;
}

.b-sub { font-size: 12px; color: #8a8a8a; margin-top: 1px; }

.b-price { text-align: right; flex-shrink: 0; margin-left: 12px; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.b-price-main-row { display: flex; align-items: baseline; gap: 4px; justify-content: flex-end; }
.b-price-top  { font-size: 11px; color: #8a8a8a; }
.b-price-main { font-size: 14px; font-weight: 650; color: #303030; }
.b-price-unit-lbl { font-size: 12px; font-weight: 400; color: #8a8a8a; }
.b-price-bottom { font-size: 11px; color: #8a8a8a; }

.b-badge {
  position: absolute;
  top: -8px;
  right: 12px;
  font-size: 11px;
  font-weight: 550;
  color: #164e63;
  background: #e0f2fe;
  padding: 1px 8px;
  border-radius: 20px;
  white-space: nowrap;
  border: 1px solid #bae6fd;
}

.preview-helper { font-size: 13px; color: #616161; line-height: 20px; }
.preview-helper a { color: #005bd3; text-decoration: underline; }
</style>
</head>
<body>

<div class="layout">

  <!-- LEFT: Config card -->
  <div class="card">
    <div class="card-section">

      <div class="card-header">
        <div class="card-title">Quantity bundle</div>
        <div class="card-subtitle">Configure tiers, pricing and display settings.</div>
      </div>

      <!-- Tier boxes -->
      <div class="tier-boxes" id="tierBoxes"></div>

      <!-- Add tier -->
      <div class="add-tier-box">
        <button class="add-tier-btn" onclick="addTier()">
          <span class="add-tier-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          Add tier
        </button>
      </div>

      <!-- Selected by default -->
      <div class="field">
        <div class="field-label">Selected by default</div>
        <select id="defaultTierSelect" onchange="onDefaultTierChange()"></select>
      </div>

      <!-- Unit size -->
      <div class="unit-size-section">
        <label class="checkbox-row">
          <input type="checkbox" id="cbSize" onchange="onUnitSizeChange()">
          <span class="checkbox-label">Unit size</span>
        </label>
        <div class="unit-size-child" id="childSize">
          <div class="unit-size-inputs">
            <div class="field">
              <div class="field-label">Per pack</div>
              <input type="number" id="unitsPerPack" min="1" step="any" oninput="renderPreview()">
            </div>
            <div class="field">
              <div class="field-label">Unit label</div>
              <input type="text" id="unitLabel" placeholder="e.g. g, ml, pcs" oninput="renderPreview()">
            </div>
          </div>
          <div class="unit-size-section">
            <label class="checkbox-row">
              <input type="checkbox" id="cbBase" onchange="onUnitSizeChange()">
              <span class="checkbox-label">Price per unit</span>
            </label>
            <div class="unit-size-child" id="childBase">
              <input type="number" id="baseQty" min="1" step="any" oninput="renderPreview()">
              <div class="sub-hint">Enter 100 to show price per 100g, or 1 for price per pc.</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Display settings grid -->
      <div class="display-grid" id="displayGrid"></div>

      <!-- Strikethrough -->
      <label class="checkbox-row">
        <input type="checkbox" id="cbStrike" onchange="renderPreview()" checked>
        <span class="checkbox-label">Strikethrough original price</span>
      </label>

    </div>
  </div>

  <!-- RIGHT: Preview card -->
  <div class="card preview-card">
    <div class="card-section">
      <div class="preview-label">Preview</div>
      <div class="bundle-list" id="previewList"></div>
      <p class="preview-helper"><a href="#">Use the theme editor</a> to preview the offer and customize the design.</p>
    </div>
  </div>

</div>

<script>
const PLACEHOLDER_PRICE = 29.99;
const fmt = p => '$' + Math.abs(p).toFixed(2);

let tiers = [
  { title: '1 Pack',  qty: 1, method: 0, value: 0  },
  { title: '2 Packs', qty: 2, method: 1, value: 10 },
  { title: '3 Packs', qty: 3, method: 1, value: 20 },
];

let defaultTierIndex = 0;
let selectedPreview  = 0;

let displayFields = [
  { id: 'leftSub',     label: 'Subtitle',       value: '' },
  { id: 'tag',         label: 'Tag',             value: '' },
  { id: 'rightMain',   label: 'Price',           value: '{{total_price}}' },
  { id: 'rightBotSub', label: 'Price subtitle',  value: '' },
  { id: 'rightTopSub', label: 'Price prefix',    value: '{{orig_total_price}}' },
  { id: 'rightSuffix', label: 'Price suffix',    value: '' },
  { id: 'badge',       label: 'Badge',           value: 'Save {{amount_saved}}', fullWidth: true },
];

let openDropdown = null;

/* ── Variable icon SVG ─────────────────────────────── */
const varIconSVG = `<svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M7 4C5.5 4 4.5 5 4.5 6.5V8.5C4.5 10 3.5 10.5 2.5 10.5C3.5 10.5 4.5 11 4.5 12.5V14.5C4.5 16 5.5 17 7 17" stroke="#616161" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M13 4C14.5 4 15.5 5 15.5 6.5V8.5C15.5 10 16.5 10.5 17.5 10.5C16.5 10.5 15.5 11 15.5 12.5V14.5C15.5 16 14.5 17 13 17" stroke="#616161" stroke-width="1.5" stroke-linecap="round"/>
</svg>`;

const packageIconSVG = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none">
  <rect x="3" y="6" width="14" height="11" rx="1.5" stroke="#616161" stroke-width="1.3"/>
  <path d="M3 9h14" stroke="#616161" stroke-width="1.3"/>
  <path d="M8 6V4.5a2 2 0 114 0V6" stroke="#616161" stroke-width="1.3"/>
</svg>`;

const dotsIconSVG = `<svg width="16" height="16" viewBox="0 0 20 20" fill="none">
  <circle cx="5" cy="10" r="1.5" fill="#616161"/>
  <circle cx="10" cy="10" r="1.5" fill="#616161"/>
  <circle cx="15" cy="10" r="1.5" fill="#616161"/>
</svg>`;

const xIconSVG = `<svg width="14" height="14" viewBox="0 0 20 20" fill="none">
  <path d="M5 5l10 10M15 5L5 15" stroke="#616161" stroke-width="1.7" stroke-linecap="round"/>
</svg>`;

/* ── Variable groups ───────────────────────────────── */
function getVarGroups() {
  const groups = [
    {
      label: 'Price',
      vars: [
        { name: 'Total price',           token: '{{total_price}}' },
        { name: 'Unit price',            token: '{{unit_price}}' },
        { name: 'Original unit price',   token: '{{orig_unit_price}}' },
        { name: 'Original total price',  token: '{{orig_total_price}}' },
      ]
    },
    {
      label: 'Discount',
      vars: [
        { name: 'Discount %',   token: '{{discount_pct}}' },
        { name: 'Amount saved', token: '{{amount_saved}}' },
      ]
    },
  ];

  if (document.getElementById('cbSize')?.checked) {
    const amount  = document.getElementById('unitsPerPack').value.trim();
    const label   = document.getElementById('unitLabel').value.trim();
    const baseQty = document.getElementById('baseQty').value.trim();
    const sizeVars = [{
      name: amount && label ? `Unit size (${amount}${label})` : 'Unit size',
      token: '{{unit_size}}'
    }];
    if (document.getElementById('cbBase')?.checked) {
      sizeVars.push({
        name: baseQty && label ? `Price per unit (per ${baseQty} ${label})` : 'Price per unit',
        token: '{{price_per_base}}'
      });
    }
    groups.push({ label: 'Size', vars: sizeVars });
  }
  return groups;
}

/* ── Unit size ─────────────────────────────────────── */
function onUnitSizeChange() {
  const sizeOn = document.getElementById('cbSize').checked;
  const baseOn = document.getElementById('cbBase').checked;
  const childSize = document.getElementById('childSize');
  const childBase = document.getElementById('childBase');
  childSize.classList.toggle('visible', sizeOn);
  childBase.classList.toggle('visible', sizeOn && baseOn);
  renderPreview();
}

function getUnitCfg() {
  if (!document.getElementById('cbSize').checked) return null;
  const amount = parseFloat(document.getElementById('unitsPerPack').value) || 0;
  const label  = document.getElementById('unitLabel').value.trim();
  if (!amount || !label) return null;
  const baseOn  = document.getElementById('cbBase').checked;
  const baseQty = parseFloat(document.getElementById('baseQty').value) || 1;
  return { amount, label, baseOn, baseQty };
}

/* ── Compute tier total ────────────────────────────── */
function computeTotal(tier) {
  if (tier.method === 0) return PLACEHOLDER_PRICE * tier.qty;
  if (tier.method === 3) return tier.value;
  const orig = PLACEHOLDER_PRICE * tier.qty;
  if (tier.method === 1) return orig * (1 - tier.value / 100);
  if (tier.method === 2) return orig - tier.value;
  return orig;
}

/* ── Template resolver ─────────────────────────────── */
function resolve(tpl, vars) {
  const strike = document.getElementById('cbStrike')?.checked;
  const s = t => strike ? `<s>${t}</s>` : t;
  const ul = document.getElementById('input_rightSuffix')?.value || '';
  return tpl
    .replace(/\{\{total_price\}\}/g,      vars.totalPrice    != null ? fmt(vars.totalPrice)                  : '')
    .replace(/\{\{unit_price\}\}/g,       vars.unitPrice     != null ? fmt(vars.unitPrice)                   : '')
    .replace(/\{\{orig_unit_price\}\}/g,  vars.origUnitPrice != null ? s(fmt(vars.origUnitPrice))            : '')
    .replace(/\{\{orig_total_price\}\}/g, vars.origTotal     != null ? s(fmt(vars.origTotal))                : '')
    .replace(/\{\{discount_pct\}\}/g,     vars.discountPct   != null ? `${vars.discountPct}%`                : '')
    .replace(/\{\{amount_saved\}\}/g,     vars.amountSaved   != null ? fmt(vars.amountSaved)                 : '')
    .replace(/\{\{unit_size\}\}/g,        vars.unitSize      != null ? vars.unitSize                         : '')
    .replace(/\{\{price_per_base\}\}/g,   vars.pricePerBase  != null ? fmt(vars.pricePerBase)                : '');
}

/* ── Default select ────────────────────────────────── */
function renderDefaultSelect() {
  const sel = document.getElementById('defaultTierSelect');
  sel.innerHTML = tiers.map((t, i) =>
    `<option value="${i}"${i === defaultTierIndex ? ' selected' : ''}>Tier #${i + 1}</option>`
  ).join('');
}

function onDefaultTierChange() {
  defaultTierIndex = +document.getElementById('defaultTierSelect').value;
  selectedPreview  = defaultTierIndex;
  renderTiers();
}

/* ── Render tier boxes ─────────────────────────────── */
function renderTiers() {
  const container = document.getElementById('tierBoxes');
  container.innerHTML = '';

  tiers.forEach((t, i) => {
    const isPct    = t.method === 1;
    const isAmount = t.method === 2;
    const isFixed  = t.method === 3;
    const isFull   = t.method === 0;
    const showPfx  = isAmount || isFixed;
    const showSfx  = isPct;

    const methodOpts = [
      ['Full price',     0],
      ['Percentage off', 1],
      ['Amount off',     2],
      ['Fixed price',    3],
    ].map(([lbl, val]) =>
      `<option value="${val}"${t.method === val ? ' selected' : ''}>${lbl}</option>`
    ).join('');

    const valueInput = !isFull ? `
      <div class="price-value-wrap${showPfx ? ' has-prefix' : ''}${showSfx ? ' has-suffix' : ''}">
        ${showPfx ? '<span class="price-affix prefix">$</span>' : ''}
        ${showSfx ? '<span class="price-affix suffix">%</span>' : ''}
        <input type="number" value="${t.value}" step="${isPct ? '1' : '0.01'}" min="0"
          oninput="tiers[${i}].value=+this.value||0;renderPreview()">
      </div>
    ` : '';

    const box = document.createElement('div');
    box.className = 'tier-box';
    box.innerHTML = `
      <div class="tier-box-header">
        <div class="tier-box-label">
          <span class="tier-icon">${packageIconSVG}</span>
          Tier #${i + 1}
        </div>
        <div class="tier-btn-group">
          <button class="tier-icon-btn" onclick="toggleActionList(event,${i})" id="menu-btn-${i}">${dotsIconSVG}</button>
          <div class="action-list" id="action-list-${i}">
            <div class="action-list-item" onclick="duplicateTier(${i});closeActionLists()">Duplicate tier</div>
          </div>
          <button class="tier-icon-btn remove" onclick="removeTier(${i})">${xIconSVG}</button>
        </div>
      </div>
      <div class="tier-box-content">
        <div class="tier-row">
          <div class="field field-qty">
            <div class="field-label">Quantity</div>
            <input type="number" value="${t.qty}" min="1"
              oninput="tiers[${i}].qty=Math.max(1,+this.value||1);renderPreview()">
          </div>
          <div class="field">
            <div class="field-label">Title</div>
            <input type="text" value="${escHtml(t.title)}"
              oninput="tiers[${i}].title=this.value;renderDefaultSelect();renderPreview()">
          </div>
        </div>
        <div class="field field-price">
          <div class="field-label">Price</div>
          <select onchange="tiers[${i}].method=+this.value;renderTiers()">${methodOpts}</select>
          ${valueInput}
        </div>
      </div>
    `;
    container.appendChild(box);
  });

  renderDefaultSelect();
  renderPreview();
}

function addTier() {
  const last = tiers[tiers.length - 1];
  tiers.push({ title: (last.qty + 1) + ' Packs', qty: last.qty + 1, method: 1, value: 5 });
  renderTiers();
}

function duplicateTier(i) {
  tiers.splice(i + 1, 0, { ...tiers[i], title: tiers[i].title + ' (copy)' });
  if (defaultTierIndex > i) defaultTierIndex++;
  if (selectedPreview  > i) selectedPreview++;
  renderTiers();
}

function removeTier(i) {
  if (tiers.length <= 1) return;
  tiers.splice(i, 1);
  if (defaultTierIndex >= tiers.length) defaultTierIndex = tiers.length - 1;
  if (selectedPreview  >= tiers.length) selectedPreview  = tiers.length - 1;
  renderTiers();
}

/* ── Display settings ──────────────────────────────── */
function renderDisplaySettings() {
  const grid = document.getElementById('displayGrid');
  grid.innerHTML = '';

  displayFields.forEach(field => {
    const wrapper = document.createElement('div');
    wrapper.className = 'display-field' + (field.fullWidth ? ' full-width' : '');
    if (field.fullWidth) wrapper.style.gridColumn = '1 / -1';

    const varsHTML = getVarGroups().map(group =>
      `<div class="var-group">
        <div class="var-group-label">${group.label}</div>
        ${group.vars.map(v =>
          `<div class="var-item" onclick="insertVar('${field.id}','${v.token}')">${v.name}</div>`
        ).join('')}
      </div>`
    ).join('');

    wrapper.innerHTML = `
      <div class="display-field-label-row">
        <span>${field.label}</span>
        <div class="tooltip-wrap">
          <button class="var-icon-btn" onclick="toggleDropdown(event,'${field.id}')">${varIconSVG}</button>
          <div class="tooltip">Insert variable</div>
        </div>
      </div>
      <div style="position:relative;">
        <input type="text" id="input_${field.id}"
          value="${escHtml(field.value)}"
          oninput="onDisplayInput('${field.id}',this.value)">
        <div class="var-dropdown" id="dd_${field.id}">${varsHTML}</div>
      </div>
    `;
    grid.appendChild(wrapper);
  });
}

function onDisplayInput(id, val) {
  const f = displayFields.find(f => f.id === id);
  if (f) f.value = val;
  renderPreview();
}

let dropdownAnchor = null;

function positionDropdown(dd, btn) {
  const rect = btn.getBoundingClientRect();
  const ddH = dd.offsetHeight;
  const spaceBelow = window.innerHeight - rect.bottom - 4;
  const spaceAbove = rect.top - 4;

  if (ddH > 0 && spaceBelow < ddH && spaceAbove > spaceBelow) {
    dd.style.top = (rect.top - 4 - ddH) + 'px';
  } else {
    dd.style.top = (rect.bottom + 4) + 'px';
  }
  dd.style.right = (window.innerWidth - rect.right) + 'px';
}

function toggleDropdown(e, fieldId) {
  e.stopPropagation();
  if (openDropdown && openDropdown !== fieldId) {
    const prevDd = document.getElementById('dd_' + openDropdown);
    if (prevDd) prevDd.classList.remove('open');
  }
  const dd = document.getElementById('dd_' + fieldId);
  if (!dd) return;
  dd.innerHTML = getVarGroups().map(group =>
    `<div class="var-group">
      <div class="var-group-label">${group.label}</div>
      ${group.vars.map(v =>
        `<div class="var-item" onclick="insertVar('${fieldId}','${v.token}')">${v.name}</div>`
      ).join('')}
    </div>`
  ).join('');
  const willOpen = !dd.classList.contains('open');
  if (willOpen) {
    dropdownAnchor = e.currentTarget;
    dd.classList.add('open');
    positionDropdown(dd, dropdownAnchor);
    openDropdown = fieldId;
  } else {
    dd.classList.remove('open');
    openDropdown = null;
    dropdownAnchor = null;
  }
}

function insertVar(fieldId, token) {
  const input = document.getElementById('input_' + fieldId);
  const s = input.selectionStart, e = input.selectionEnd;
  input.value = input.value.slice(0, s) + token + input.value.slice(e);
  input.focus();
  input.setSelectionRange(s + token.length, s + token.length);
  const f = displayFields.find(f => f.id === fieldId);
  if (f) f.value = input.value;
  document.getElementById('dd_' + fieldId).classList.remove('open');
  openDropdown = null;
  dropdownAnchor = null;
  renderPreview();
}

document.addEventListener('click', (e) => {
  if (openDropdown) {
    const dd = document.getElementById('dd_' + openDropdown);
    if (dd && !dd.contains(e.target)) {
      dd.classList.remove('open');
      openDropdown = null;
      dropdownAnchor = null;
    }
  }
});

window.addEventListener('scroll', () => {
  if (openDropdown && dropdownAnchor) {
    const dd = document.getElementById('dd_' + openDropdown);
    if (dd) positionDropdown(dd, dropdownAnchor);
  }
}, true);

function toggleActionList(e, i) {
  e.stopPropagation();
  const id = 'action-list-' + i;
  const isOpen = document.getElementById(id).classList.contains('open');
  closeActionLists();
  if (!isOpen) document.getElementById(id).classList.add('open');
}

function closeActionLists() {
  document.querySelectorAll('.action-list').forEach(el => el.classList.remove('open'));
}

document.addEventListener('click', closeActionLists);

/* ── Render preview ────────────────────────────────── */
function renderPreview() {
  const list = document.getElementById('previewList');
  list.innerHTML = '';

  const unitCfg       = getUnitCfg();
  const unitPriceLbl  = displayFields.find(f => f.id === 'rightSuffix')?.value || '';

  const leftSubTpl   = displayFields.find(f => f.id === 'leftSub').value;
  const tagTpl       = displayFields.find(f => f.id === 'tag').value;
  const rightMainTpl = displayFields.find(f => f.id === 'rightMain').value;
  const rightBotTpl  = displayFields.find(f => f.id === 'rightBotSub').value;
  const rightTopTpl  = displayFields.find(f => f.id === 'rightTopSub').value;
  const badgeTpl     = displayFields.find(f => f.id === 'badge').value;

  tiers.forEach((t, i) => {
    const total       = computeTotal(t);
    const unit        = t.qty > 0 ? total / t.qty : 0;
    const origTotal   = PLACEHOLDER_PRICE * t.qty;
    const origUnit    = PLACEHOLDER_PRICE;
    const saved       = origTotal - total;
    const discountPct = saved > 0.001 ? Math.round((saved / origTotal) * 100) : 0;

    const unitSize     = unitCfg ? (t.qty * unitCfg.amount) + ' ' + unitCfg.label : null;
    const pricePerBase = unitCfg && unitCfg.baseOn
      ? (total / (t.qty * unitCfg.amount)) * unitCfg.baseQty
      : null;

    const vars = {
      totalPrice:    total,
      unitPrice:     unit,
      origUnitPrice: t.method !== 0 ? origUnit : null,
      origTotal:     t.method !== 0 ? origTotal : null,
      discountPct:   discountPct > 0 ? discountPct : null,
      amountSaved:   saved > 0.001 ? saved : null,
      unitSize,
      pricePerBase,
    };

    const leftSubText  = resolve(leftSubTpl, vars).trim();
    const tagText      = resolve(tagTpl, vars).trim();
    const rightMainText = resolve(rightMainTpl, vars).trim();
    const rightBotText = resolve(rightBotTpl, vars).trim();
    const rightTopText = resolve(rightTopTpl, vars).trim();
    const badgeText    = i === 0 ? '' : resolve(badgeTpl, vars).trim();

    const showUnitLbl = !!unitPriceLbl;
    const isActive = selectedPreview === i;

    const card = document.createElement('div');
    card.className = 'b-card' + (isActive ? ' active' : '');
    card.onclick = () => { selectedPreview = i; renderPreview(); };

    card.innerHTML = `
      ${badgeText ? `<div class="b-badge">${badgeText}</div>` : ''}
      <div class="b-radio"><div class="b-radio-dot"></div></div>
      <div class="b-info">
        <div class="b-name-row">
          <span class="b-name">${escHtml(t.title)}</span>
          ${tagText ? `<span class="b-tag">${tagText}</span>` : ''}
        </div>
        ${leftSubText ? `<div class="b-sub">${leftSubText}</div>` : ''}
      </div>
      <div class="b-price">
        <div class="b-price-main-row">
          ${rightTopText ? `<span class="b-price-top">${rightTopText}</span>` : ''}
          <span class="b-price-main">${rightMainText || '—'}</span>
          ${showUnitLbl ? `<span class="b-price-unit-lbl">${escHtml(unitPriceLbl)}</span>` : ''}
        </div>
        ${rightBotText ? `<div class="b-price-bottom">${rightBotText}</div>` : ''}
      </div>
    `;

    list.appendChild(card);
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init ──────────────────────────────────────────── */
renderTiers();
renderDisplaySettings();
renderPreview();
</script>

</body>
</html>
